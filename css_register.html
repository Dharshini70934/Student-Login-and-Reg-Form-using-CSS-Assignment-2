<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Register</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px 0; }
    .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 340px; }
    h2 { text-align: center; margin-bottom: 20px; }
    label { font-size: 13px; }
    input, select, textarea { width: 100%; padding: 8px; margin: 4px 0 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
    input.invalid, select.invalid, textarea.invalid { border-color: red; }
    input.valid, select.valid, textarea.valid { border-color: green; }
    .err { color: red; font-size: 11px; margin-bottom: 6px; display: none; }
    button { width: 100%; padding: 9px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
    p { text-align: center; font-size: 13px; margin-top: 10px; }
    a { color: #4a90d9; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Student Registration</h2>
    <label>Roll No.</label>
    <input type="text" id="roll" placeholder="e.g. 2024CSE001"/>
    <div class="err" id="rollErr">Roll number is required.</div>
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Enter full name"/>
    <div class="err" id="nameErr">Name must be letters only.</div>
    <label>Date of Birth</label>
    <input type="date" id="dob"/>
    <div class="err" id="dobErr">Enter a valid past date.</div>
    <label>Mobile No.</label>
    <input type="tel" id="mob" placeholder="10-digit number" maxlength="10"/>
    <div class="err" id="mobErr">Enter valid 10-digit number.</div>
    <label>Email</label>
    <input type="email" id="email" placeholder="student@example.com"/>
    <div class="err" id="emailErr">Enter a valid email.</div>
    <label>Password</label>
    <input type="password" id="pass" placeholder="Min 6 characters"/>
    <div class="err" id="passErr">Min 6 characters required.</div>
    <label>Gender</label>
    <select id="gender">
      <option value="">-- Select Gender --</option>
      <option>Male</option><option>Female</option><option>Other</option>
    </select>
    <div class="err" id="genderErr">Please select gender.</div>
    <label>Course</label>
    <select id="course">
      <option value="">-- Select Course --</option>
      <option>B.Tech</option><option>M.Tech</option><option>BCA</option><option>MCA</option>
    </select>
    <div class="err" id="courseErr">Please select a course.</div>
    <button onclick="go()">Register</button>
    <p>Already registered? <a href="css_login.html">Login</a></p>
  </div>
  <script>
    function chk(id, errId, cond) {
      document.getElementById(id).className = cond ? 'valid' : 'invalid';
      document.getElementById(errId).style.display = cond ? 'none' : 'block';
      return cond;
    }
    function v(id) { return document.getElementById(id).value; }
    function go() {
      const ok = [
        chk('roll',   'rollErr',   v('roll').trim() !== ''),
        chk('name',   'nameErr',   /^[a-zA-Z\s]{2,}$/.test(v('name').trim())),
        chk('dob',    'dobErr',    v('dob') !== '' && new Date(v('dob')) < new Date()),
        chk('mob',    'mobErr',    /^\d{10}$/.test(v('mob'))),
        chk('email',  'emailErr',  /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v('email'))),
        chk('pass',   'passErr',   v('pass').length >= 6),
        chk('gender', 'genderErr', v('gender') !== ''),
        chk('course', 'courseErr', v('course') !== '')
      ];
      if (ok.every(Boolean)) alert('Registration successful!');
    }
  </script>
</body>
</html>
