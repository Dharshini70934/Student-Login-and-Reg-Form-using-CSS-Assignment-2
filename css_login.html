<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 300px; }
    h2 { text-align: center; margin-bottom: 20px; }
    label { font-size: 13px; }
    input { width: 100%; padding: 8px; margin: 4px 0 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    input.invalid { border-color: red; }
    input.valid { border-color: green; }
    .err { color: red; font-size: 11px; margin-bottom: 8px; display: none; }
    button { width: 100%; padding: 9px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; }
    p { text-align: center; font-size: 13px; margin-top: 10px; }
    a { color: #4a90d9; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Login</h2>
    <label>Username</label>
    <input type="text" id="u" placeholder="Enter username"/>
    <div class="err" id="uErr">Min 3 characters required.</div>
    <label>Email</label>
    <input type="email" id="e" placeholder="Enter email"/>
    <div class="err" id="eErr">Enter a valid email.</div>
    <label>Password</label>
    <input type="password" id="p" placeholder="Enter password"/>
    <div class="err" id="pErr">Min 6 characters required.</div>
    <button onclick="go()">Login</button>
    <p>No account? <a href="css_register.html">Register</a></p>
  </div>
  <script>
    function chk(id, errId, cond) {
      document.getElementById(id).className = cond ? 'valid' : 'invalid';
      document.getElementById(errId).style.display = cond ? 'none' : 'block';
      return cond;
    }
    function go() {
      const ok = [
        chk('u', 'uErr', document.getElementById('u').value.trim().length >= 3),
        chk('e', 'eErr', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById('e').value)),
        chk('p', 'pErr', document.getElementById('p').value.length >= 6)
      ];
      if (ok.every(Boolean)) alert('Login successful!');
    }
  </script>
</body>
</html>
