<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="register-container">
    <h1>STUDENT REGISTRATION FORM</h1>

    <form>

        <div class="form-group">
            <label>Roll No:</label>
            <input 
                type="text" 
                required
                pattern="[0-9]{1,10}"
                title="Enter valid roll number"
            >
        </div>

        <div class="form-group">
            <label>Email ID:</label>
            <input 
                type="email" 
                required
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                title="Enter a valid email address"
            >
        </div>

        <div class="form-group">
            <label>Student Name:</label>
            <div class="row">
                <input 
                    type="text" 
                    placeholder="First Name" 
                    required
                    pattern="[A-Za-z ]+"
                    title="Only alphabets allowed"
                >

                <input 
                    type="text" 
                    placeholder="Last Name" 
                    required
                    pattern="[A-Za-z ]+"
                    title="Only alphabets allowed"
                >
            </div>
        </div>

        <div class="form-group">
            <label>Password:</label>
            <input 
                type="password" 
                required
                minlength="6"
                maxlength="12"
                title="Password must contain 6-12 characters"
            >
        </div>

        <div class="form-group">
            <label>Father's Name:</label>
            <input 
                type="text" 
                required
                pattern="[A-Za-z ]+"
                title="Only alphabets allowed"
            >
        </div>

        <div class="form-group">
            <label>Mobile No:</label>
            <div class="mobile-row">
                <input type="text" value="+91" class="code" readonly>

                <input 
                    type="tel" 
                    placeholder="10 digit number" 
                    required
                    pattern="[0-9]{10}"
                    title="Enter valid 10 digit mobile number"
                >
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth:</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Course:</label>
            <select required>
                <option value="">Select Course</option>
                <option>B.TECH</option>
                <option>B.COM</option>
                <option>M.SC</option>
            </select>
        </div>

        <div class="form-group">
            <label>Gender:</label>
            <div class="inline-group">
                <label><input type="radio" name="gender" required> Male</label>
                <label><input type="radio" name="gender"> Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Department:</label>
            <div class="inline-group">
                <label><input type="radio" name="dept" required> AI&DS</label>
                <label><input type="radio" name="dept"> IT</label>
                <label><input type="radio" name="dept"> CSE</label>
                <label><input type="radio" name="dept"> Civil</label>
            </div>
        </div>

        <div class="form-group">
            <label>Student Photo:</label>
            <input 
                type="file"
                accept=".jpg,.jpeg,.png"
                required
            >
        </div>

        <div class="form-group">
            <label>City:</label>
            <input 
                type="text"
                required
                pattern="[A-Za-z ]+"
                title="Only alphabets allowed"
            >
        </div>

        <div class="form-group">
            <label>Address:</label>
            <textarea required></textarea>
        </div>

        <div class="center-btn">
            <button type="submit">Register</button>
        </div>

    </form>
</div>

</body>
</html>
